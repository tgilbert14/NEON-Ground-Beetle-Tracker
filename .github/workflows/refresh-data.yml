name: Refresh NEON data bundle

# Monthly rebuild of the per-site ground-beetle .rds bundles (data/sites/*.rds),
# the cross-site precompute cache (data/precomputed.rds), and the deploy manifest,
# then a direct push to main. Runs late on the FIRST SATURDAY NIGHT of each month
# (~11pm Arizona time) so any republish lands off-peak. NEON publishes on a lag, so
# a monthly pull keeps the bundled data current. Posit Connect Cloud auto-republishes
# on every push to main.
#
# REQUIRES one repo secret (Settings → Secrets and variables → Actions):
#   NEON_TOKEN   your NEON API token (optional but recommended; speeds the pull)
# Trigger manually from the Actions tab (workflow_dispatch); tick "skip_download"
# to just rebuild the precompute cache from the committed bundles (fast, no pull).

on:
  schedule:
    # Every Sunday 06:00 UTC == Saturday 23:00 America/Phoenix (Arizona, no DST).
    # Cron can't express "first Saturday of the month", so we fire every Saturday
    # night and let the `gate` job below proceed only on the first one.
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      skip_download:
        description: "Skip the NEON re-pull; just rebuild the precompute cache from committed bundles (fast test)"
        type: boolean
        default: false

permissions:
  contents: write          # commit the refreshed bundle to the PR branch
  pull-requests: write     # open/update the data-refresh PR

jobs:
  # Gate: only the FIRST Saturday night (Arizona time) runs the heavy refresh.
  # Manual runs (workflow_dispatch) always proceed.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          dow=$(TZ='America/Phoenix' date +%u)    # 6 = Saturday
          day=$(TZ='America/Phoenix' date +%-d)   # day-of-month, no leading zero
          if [ "$dow" = "6" ] && [ "$day" -le 7 ]; then
            echo "First Saturday in Arizona (day $day) — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not the first Saturday in Arizona (dow=$dow day=$day) — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  refresh:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # push to main -> Connect Cloud auto-redeploys

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # refresh_data.R pulls + bundles, then sources precompute.R which sources
      # global.R — so the runner needs the full app runtime (else precompute fails
      # and a STALE precomputed.rds would ship), plus neonUtilities + rsconnect.
      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: >
            neonUtilities, dplyr, tibble, tidyr, DT, RColorBrewer, bsicons, bslib,
            htmltools, leaflet, plotly, shiny, shinycssloaders, shinyjs, ggplot2, rsconnect

      # Full re-pull. The script is RESUMABLE (skips existing data/sites/*.rds), so
      # delete them first to force a fresh pull; refresh_data.R then re-bundles,
      # rebuilds data/precomputed.rds, regenerates manifest.json, and a mass-failure
      # guard inside it stop()s before any of that if too few sites pulled.
      - name: Rebuild the per-site bundles (full NEON re-pull)
        if: ${{ github.event.inputs.skip_download != 'true' }}
        env:
          NEON_TOKEN: ${{ secrets.NEON_TOKEN }}
        run: |
          rm -f data/sites/*.rds
          Rscript scripts/refresh_data.R

      - name: Rebuild the precompute cache only (skip-download fast path)
        if: ${{ github.event.inputs.skip_download == 'true' }}
        run: |
          Rscript scripts/precompute.R

      # Rebuild the bundled "Search the network" index (data/search_index.rds) from
      # the freshly-rebuilt site bundles so it can never drift from the committed data.
      # Runs on BOTH paths (full re-pull and skip-download), before the manifest +
      # before the commit, so the index ships with the deploy.
      - name: Rebuild the search index
        run: |
          Rscript scripts/build_search_index.R

      # Finalize the lean deploy manifest AFTER the index is on disk (so manifest.json
      # reflects the rebuilt files) and run the lean hard-gate. Idempotent: refresh_data.R
      # already regenerates it on the full path; re-running keeps the skip path honest.
      - name: Regenerate + gate the deploy manifest
        run: |
          Rscript scripts/write_manifest.R

      # Commit + push refreshed data DIRECTLY to main. THIS is the deploy: the push
      # makes Connect Cloud auto-republish (matching the SM / Veg / Plant siblings,
      # and the suite standard of auto-push to the watched branch, not PR-merge).
      # Guarded so it no-ops cleanly when nothing changed.
      - name: Commit & push refreshed data to main
        run: |
          git config user.name  "neon-data-bot"
          git config user.email "neon-data-bot@users.noreply.github.com"
          git add -A data manifest.json
          if git diff --cached --quiet; then
            echo "No data changes - nothing to commit or deploy."
          else
            git commit -m "data: monthly NEON ground-beetle refresh [bot]"
            git push origin HEAD:main
            echo "Pushed refreshed data to main - Connect Cloud will redeploy."
          fi
